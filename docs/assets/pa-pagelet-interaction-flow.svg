  <text x="420" y="270" text-anchor="middle" class="state-desc">auto-restore</text>
  <path d="M 515,193 C 515,260 400,290 335,250" stroke="#ea580c" stroke-width="1" fill="none" stroke-dasharray="4,2" marker-end="url(#ao)"/>
  <rect x="30" y="325" width="1140" height="350" rx="6" fill="none" stroke="#d1d5db" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="45" y="345" class="section-title">4-Layer Escalation Flow (each layer is self-contained — user can stop at any point)</text>
  <circle cx="70" cy="460" r="22" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="70" y="457" text-anchor="middle" class="state-desc">User</text>
  <text x="70" y="468" text-anchor="middle" class="state-desc">Action</text>
  <rect x="120" y="380" width="120" height="70" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#sh)"/>
  <text x="180" y="405" text-anchor="middle" class="state-label">L1: Pet</text>
  <text x="180" y="420" text-anchor="middle" class="state-desc">Click / Tap</text>
  <text x="180" y="435" text-anchor="middle" class="state-desc">→ opens Bubble</text>
  <polygon points="310,415 365,385 420,415 365,445" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="365" y="412" text-anchor="middle" class="state-desc">Bubble</text>
  <text x="365" y="424" text-anchor="middle" class="state-desc">Content?</text>
  <rect x="450" y="365" width="130" height="100" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#sh)"/>
  <text x="515" y="385" text-anchor="middle" class="state-label">L2: Bubble</text>
  <text x="515" y="400" text-anchor="middle" class="state-desc">quick-review</text>
  <text x="515" y="412" text-anchor="middle" class="state-desc">quiet-recall nudge</text>
  <text x="515" y="424" text-anchor="middle" class="state-desc">pattern nudge</text>
  <text x="515" y="436" text-anchor="middle" class="state-desc">onboarding</text>
  <text x="515" y="452" text-anchor="middle" class="state-desc">empty (3 actions)</text>
  <polygon points="630,415 680,385 730,415 680,445" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="680" y="412" text-anchor="middle" class="state-desc">User</text>
  <text x="680" y="424" text-anchor="middle" class="state-desc">decides</text>
  <rect x="770" y="365" width="130" height="100" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#sh)"/>
  <text x="835" y="385" text-anchor="middle" class="state-label">L3: Panel</text>
  <text x="835" y="400" text-anchor="middle" class="state-desc">Evidence + actions</text>
  <text x="835" y="412" text-anchor="middle" class="state-desc">Scope controls</text>
  <text x="835" y="424" text-anchor="middle" class="state-desc">Draft collection</text>
  <text x="835" y="436" text-anchor="middle" class="state-desc">Connection graph</text>
  <text x="835" y="452" text-anchor="middle" class="state-desc">Save as review note</text>
  <rect x="940" y="365" width="130" height="100" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#sh)"/>
  <text x="1005" y="385" text-anchor="middle" class="state-label">L4: Tab</text>
  <text x="1005" y="400" text-anchor="middle" class="state-desc">Full deep review</text>
  <text x="1005" y="412" text-anchor="middle" class="state-desc">9 sections flat</text>
  <text x="1005" y="424" text-anchor="middle" class="state-desc">Memory governance</text>
  <text x="1005" y="436" text-anchor="middle" class="state-desc">Maintenance review</text>
  <text x="1005" y="452" text-anchor="middle" class="state-desc">Quiet recall detail</text>
  <line x1="92" y1="460" x2="118" y2="430" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="240" y1="415" x2="308" y2="415" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="420" y1="415" x2="448" y2="415" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="580" y1="415" x2="628" y2="415" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="730" y1="415" x2="768" y2="415" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>
  <rect x="731" y="400" width="40" height="13" rx="2" class="arrow-label-bg"/>
  <text x="751" y="410" text-anchor="middle" class="arrow-label">expand</text>
  <line x1="900" y1="415" x2="938" y2="415" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>
  <rect x="900" y="400" width="40" height="13" rx="2" class="arrow-label-bg"/>
  <text x="920" y="410" text-anchor="middle" class="arrow-label">expand</text>
  <text x="180" y="475" text-anchor="middle" class="state-desc" fill="#16a34a">can stop here</text>
  <line x1="515" y1="465" x2="515" y2="500" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="515" y="515" text-anchor="middle" class="state-desc" fill="#16a34a">close / dismiss</text>
  <text x="515" y="527" text-anchor="middle" class="state-desc" fill="#16a34a">= valid completion</text>
  <line x1="835" y1="465" x2="835" y2="500" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="835" y="515" text-anchor="middle" class="state-desc" fill="#16a34a">close panel</text>
  <text x="835" y="527" text-anchor="middle" class="state-desc" fill="#16a34a">= valid completion</text>
  <line x1="680" y1="445" x2="680" y2="490" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#ay)"/>
  <text x="680" y="505" text-anchor="middle" class="state-desc" fill="#9ca3af">dismiss / later</text>
  <text x="680" y="517" text-anchor="middle" class="state-desc" fill="#9ca3af">no penalty</text>
  <rect x="120" y="550" width="450" height="55" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1" filter="url(#sh)"/>
  <text x="345" y="570" text-anchor="middle" class="state-label" fill="#7c3aed">Background Preparation Engine</text>
  <text x="345" y="586" text-anchor="middle" class="state-desc">Timed polling + Change detection → AI analysis → Preload cache → Pet nudge</text>
  <text x="345" y="598" text-anchor="middle" class="state-desc">Gated by: proactiveHintsEnabled + quiet hours + cooldown | runKind=background, allowWrite=false</text>
  <path d="M 345,550 L 345,530 L 50,530 L 50,415 L 118,415" stroke="#7c3aed" stroke-width="1" fill="none" stroke-dasharray="4,2" marker-end="url(#ap)"/>
  <rect x="55" y="517" width="55" height="13" rx="2" class="arrow-label-bg"/>
  <text x="82" y="527" text-anchor="middle" class="arrow-label" fill="#7c3aed">nudge Pet</text>
  <rect x="620" y="550" width="450" height="55" rx="8" fill="#f0fdfa" stroke="#5eead4" stroke-width="1" filter="url(#sh)"/>
  <text x="845" y="570" text-anchor="middle" class="state-label" fill="#0d9488">Quiet Recall Trigger</text>
  <text x="845" y="586" text-anchor="middle" class="state-desc">Leaf change (250ms debounce) | Note save | Double-Ctrl shortcut</text>
  <text x="845" y="598" text-anchor="middle" class="state-desc">Multi-signal ranking: links + backlinks + tags + folder proximity + VSS similarity</text>
  <path d="M 620,575 C 530,575 480,480 470,465" stroke="#0d9488" stroke-width="1" fill="none" stroke-dasharray="4,2" marker-end="url(#ag)"/>
  <rect x="512" y="530" width="72" height="13" rx="2" class="arrow-label-bg"/>
  <text x="548" y="540" text-anchor="middle" class="arrow-label" fill="#0d9488">recall nudge</text>
  <rect x="120" y="480" width="120" height="36" rx="16" fill="#fffbeb" stroke="#fcd34d" stroke-width="1" filter="url(#sh)"/>
  <text x="180" y="498" text-anchor="middle" class="state-desc">Quick Capture</text>
  <text x="180" y="510" text-anchor="middle" class="state-desc">long-press / Shift+Enter</text>
  <line x1="180" y1="450" x2="180" y2="478" stroke="#ea580c" stroke-width="1" marker-end="url(#ao)"/>
  <rect x="140" y="458" width="60" height="13" rx="2" class="arrow-label-bg"/>
  <text x="170" y="468" text-anchor="middle" class="arrow-label" fill="#ea580c">long-press</text>
  <g transform="translate(620, 640)">
    <line x1="0" y1="8" x2="30" y2="8" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>
    <text x="36" y="12" class="legend-text">User interaction</text>
    <line x1="140" y1="8" x2="170" y2="8" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#ap)"/>
    <text x="176" y="12" class="legend-text">Background trigger</text>
    <line x1="300" y1="8" x2="330" y2="8" stroke="#0d9488" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#ag)"/>
    <text x="336" y="12" class="legend-text">Quiet Recall</text>
    <line x1="420" y1="8" x2="450" y2="8" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="456" y="12" class="legend-text">Valid exit point</text>
  </g>
</svg>