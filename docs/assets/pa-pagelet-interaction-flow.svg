  <rect x="62" y="165" width="32" height="13" rx="2" class="arrow-label-bg"/>
  <text x="78" y="175" text-anchor="middle" class="arrow-label">done</text>
  <line x1="280" y1="118" x2="212" y2="118" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#ay)"/>
  <rect x="226" y="105" width="42" height="13" rx="2" class="arrow-label-bg"/>
  <text x="247" y="115" text-anchor="middle" class="arrow-label">interact</text>
  <line x1="210" y1="148" x2="278" y2="200" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#ay)"/>
  <rect x="225" y="184" width="42" height="13" rx="2" class="arrow-label-bg"/>
  <text x="246" y="194" text-anchor="middle" class="arrow-label">10min</text>
  <line x1="280" y1="228" x2="212" y2="228" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#ay)"/>
  <rect x="226" y="230" width="42" height="13" rx="2" class="arrow-label-bg"/>
  <text x="247" y="240" text-anchor="middle" class="arrow-label">activity</text>
