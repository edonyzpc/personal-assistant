<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .title { font-size: 18px; font-weight: 600; fill: #111827; }
    .subtitle { font-size: 12px; fill: #6b7280; }
    .state-label { font-size: 13px; font-weight: 600; fill: #111827; }
    .state-desc { font-size: 10px; fill: #6b7280; }
    .section-title { font-size: 14px; font-weight: 600; fill: #374151; }
    .arrow-label { font-size: 10px; fill: #374151; }
    .arrow-label-bg { fill: #ffffff; opacity: 0.95; }
    .legend-text { font-size: 11px; fill: #6b7280; }
  </style>
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="ao" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
    <marker id="ap" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
    <marker id="ay" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af"/></marker>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="108%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.06"/></filter>
  </defs>
  <rect width="1200" height="700" fill="#ffffff"/>
  <text x="600" y="32" text-anchor="middle" class="title">PA Pagelet Interaction Flow</text>
  <text x="600" y="48" text-anchor="middle" class="subtitle">Pet State Machine + 4-Layer Escalation + User Decision Points</text>
  <rect x="30" y="62" width="560" height="250" rx="6" fill="none" stroke="#d1d5db" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="45" y="82" class="section-title">Pet State Machine</text>
  <circle cx="65" cy="170" r="8" fill="#111827"/>
  <rect x="100" y="100" width="110" height="56" rx="20" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#sh)"/>
  <text x="155" y="124" text-anchor="middle" class="state-label">idle</text>
  <text x="155" y="140" text-anchor="middle" class="state-desc">float animation</text>
  <text x="155" y="150" text-anchor="middle" class="state-desc">gray, neutral</text>
  <rect x="100" y="190" width="110" height="56" rx="20" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#sh)"/>
  <text x="155" y="214" text-anchor="middle" class="state-label">working</text>
  <text x="155" y="230" text-anchor="middle" class="state-desc">pulse, blue</text>
  <text x="155" y="240" text-anchor="middle" class="state-desc">task-specific color</text>
  <rect x="280" y="100" width="110" height="56" rx="20" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" filter="url(#sh)"/>
  <text x="335" y="124" text-anchor="middle" class="state-label">nudge</text>
  <text x="335" y="140" text-anchor="middle" class="state-desc">bounce + dot</text>
  <text x="335" y="150" text-anchor="middle" class="state-desc">green glow</text>
  <rect x="280" y="190" width="110" height="56" rx="20" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5" filter="url(#sh)"/>
  <text x="335" y="214" text-anchor="middle" class="state-label">resting</text>
  <text x="335" y="230" text-anchor="middle" class="state-desc">breathe, zzz</text>
  <text x="335" y="240" text-anchor="middle" class="state-desc">dim, 0.8 opacity</text>
  <rect x="460" y="145" width="110" height="48" rx="20" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#sh)"/>
  <text x="515" y="167" text-anchor="middle" class="state-label">error</text>
  <text x="515" y="181" text-anchor="middle" class="state-desc">red flash, transient</text>
  <line x1="73" y1="170" x2="98" y2="135" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="155" y1="156" x2="155" y2="188" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>
  <rect x="158" y="163" width="54" height="13" rx="2" class="arrow-label-bg"/>
  <text x="185" y="173" text-anchor="middle" class="arrow-label">command</text>
  <line x1="210" y1="210" x2="278" y2="140" stroke="#16a34a" stroke-width="1.5" marker-end="url(#ag)"/>
  <rect x="220" y="164" width="62" height="13" rx="2" class="arrow-label-bg"/>
  <text x="251" y="174" text-anchor="middle" class="arrow-label">insights ok</text>
