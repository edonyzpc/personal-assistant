<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 880" width="1100" height="880">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 18px; font-weight: 600; fill: #111827; }
    .layer-label { font-size: 14px; font-weight: 600; fill: #374151; }
    .node-label { font-size: 13px; font-weight: 500; fill: #111827; }
    .sub-label { font-size: 11px; fill: #6b7280; }
    .interface-label { font-size: 12px; font-weight: 500; fill: #1e40af; font-style: italic; }
    .code-label { font-size: 11px; fill: #4b5563; font-family: "SF Mono", "Fira Code", monospace; }
    .legend-text { font-size: 11px; fill: #6b7280; }
    .tag { font-size: 10px; font-weight: 600; fill: #ffffff; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1100" height="880" fill="#ffffff"/>
  <text x="550" y="32" text-anchor="middle" class="title">PA Agent Loop ↔ LangChain 调用链路</text>
  <!-- Layer 1: PaAgentLoop -->
  <rect x="30" y="50" width="700" height="240" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="40" y="56" width="220" height="22" rx="4" fill="#2563eb"/>
  <text x="50" y="72" class="tag">层1: PaAgentLoop — 纯编排层（不依赖 LangChain）</text>
  <rect x="60" y="90" width="240" height="80" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="90" width="240" height="24" rx="10" fill="#2563eb"/>
  <rect x="60" y="104" width="240" height="10" fill="#2563eb"/>
  <text x="180" y="107" text-anchor="middle" class="tag">PaAgentLoop</text>
  <text x="72" y="132" class="code-label">turn 循环 · 工具调度</text>
  <text x="72" y="148" class="code-label">超时/abort · observation budget</text>
  <text x="72" y="163" class="code-label">去重 · wall-clock 限制</text>
  <rect x="340" y="90" width="220" height="46" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="350" y="109" class="interface-label">«interface» PaAgentModel</text>
  <text x="350" y="127" class="code-label">stream(input): AsyncIterable&lt;Chunk&gt;</text>
  <rect x="340" y="148" width="220" height="46" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="350" y="167" class="interface-label">«interface» PaAgentToolExecutor</text>
  <text x="350" y="185" class="code-label">execute(input): Promise&lt;Result&gt;</text>
  <rect x="340" y="206" width="220" height="46" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="350" y="225" class="interface-label">«interface» PaAgentHostPolicy</text>
  <text x="350" y="243" class="code-label">afterTurn(summary): Decision</text>
  <line x1="300" y1="120" x2="338" y2="113" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="300" y1="140" x2="338" y2="171" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="300" y1="155" x2="338" y2="229" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="570" y="130" width="150" height="36" rx="6" fill="#dbeafe" stroke="none"/>
  <text x="645" y="145" text-anchor="middle" class="sub-label" fill="#1e40af">Loop 只依赖 3 个接口</text>
  <text x="645" y="159" text-anchor="middle" class="sub-label" fill="#1e40af">完全不知道 LangChain</text>
  <!-- Layer 2: PaAgentRuntime -->
  <rect x="30" y="310" width="700" height="240" rx="12" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="40" y="316" width="280" height="22" rx="4" fill="#7c3aed"/>
  <text x="50" y="332" class="tag">层2: PaAgentRuntime — 集成层（LangChain 在此出现）</text>
  <rect x="60" y="350" width="280" height="120" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="350" width="280" height="24" rx="8" fill="#7c3aed"/>
  <rect x="60" y="364" width="280" height="10" fill="#7c3aed"/>
  <text x="200" y="367" text-anchor="middle" class="tag">实现 PaAgentModel 接口</text>
  <text x="72" y="392" class="code-label">model = { stream: async function*() {</text>
  <text x="82" y="407" class="code-label">  llm = createChatModel() → ChatOpenAI</text>
  <text x="82" y="422" class="code-label">  prompt = ChatPromptTemplate.fromMessages()</text>
  <text x="82" y="437" class="code-label">  chain = prompt.pipe(runnable)</text>
  <text x="82" y="452" class="code-label">  yield* streamWithInvokeFallback(chain)</text>
  <text x="72" y="465" class="code-label">}}</text>
  <rect x="370" y="350" width="200" height="56" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="470" y="373" text-anchor="middle" class="node-label">格式转换</text>
  <text x="380" y="393" class="code-label">parseNativeToolCalls()</text>
  <text x="380" y="398" class="sub-label"> </text>
  <rect x="370" y="418" width="200" height="56" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="470" y="441" text-anchor="middle" class="node-label">流式容错</text>
  <text x="380" y="461" class="code-label">streamWithInvokeFallback()</text>
  <line x1="200" y1="350" x2="200" y2="292" stroke="#7c3aed" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>
  <rect x="145" y="296" width="110" height="18" rx="3" fill="#ffffff" stroke="none"/>
  <text x="200" y="310" text-anchor="middle" class="sub-label" fill="#7c3aed">实现 «interface»</text>
  <line x1="340" y1="378" x2="368" y2="378" stroke="#9ca3af" stroke-width="1" marker-end="url(#arrow-gray)"/>
  <line x1="340" y1="446" x2="368" y2="446" stroke="#9ca3af" stroke-width="1" marker-end="url(#arrow-gray)"/>
  <rect x="590" y="358" width="130" height="54" rx="6" fill="#ede9fe" stroke="none"/>
  <text x="655" y="375" text-anchor="middle" class="sub-label" fill="#6d28d9">LangChain 提供:</text>
  <text x="655" y="390" text-anchor="middle" class="sub-label" fill="#6d28d9">ChatPromptTemplate</text>
  <text x="655" y="405" text-anchor="middle" class="sub-label" fill="#6d28d9">.pipe() LCEL 管道</text>
  <!-- Layer 3: LangChain + Provider -->
  <rect x="30" y="570" width="700" height="130" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="40" y="576" width="220" height="22" rx="4" fill="#059669"/>
  <text x="50" y="592" class="tag">层3: LangChain + AI Provider</text>
  <rect x="60" y="610" width="180" height="70" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="610" width="180" height="22" rx="8" fill="#059669"/>
  <rect x="60" y="624" width="180" height="8" fill="#059669"/>
  <text x="150" y="627" text-anchor="middle" class="tag">ChatOpenAI</text>
  <text x="72" y="650" class="code-label">.bindTools(schemas)</text>
  <text x="72" y="665" class="code-label">.stream() / .invoke()</text>
  <rect x="280" y="610" width="180" height="70" rx="8" fill="#ffffff" stroke="#059669" stroke-width="1.5"/>
  <rect x="280" y="610" width="180" height="22" rx="8" fill="#16a34a"/>
  <rect x="280" y="624" width="180" height="8" fill="#16a34a"/>
  <text x="370" y="627" text-anchor="middle" class="tag">OpenAIEmbeddings</text>
  <text x="292" y="650" class="code-label">.embedQuery(text)</text>
  <text x="292" y="665" class="sub-label">用于 VSS，不在 loop 中</text>
  <rect x="520" y="610" width="190" height="70" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="615" y="640" text-anchor="middle" class="node-label">AI Provider API</text>
  <text x="615" y="658" text-anchor="middle" class="sub-label">OpenAI / DashScope / Qwen</text>
  <text x="615" y="673" text-anchor="middle" class="sub-label">兼容 OpenAI 格式</text>
  <line x1="200" y1="470" x2="150" y2="608" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="120" y="530" width="120" height="18" rx="3" fill="#ffffff" stroke="none"/>
  <text x="180" y="543" text-anchor="middle" class="sub-label" fill="#059669">createChatModel()</text>
  <line x1="240" y1="650" x2="518" y2="650" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <rect x="340" y="638" width="80" height="16" rx="3" fill="#ffffff" stroke="none"/>
  <text x="380" y="650" text-anchor="middle" class="sub-label">HTTP API</text>
  <!-- Auxiliary calls -->
  <rect x="760" y="50" width="320" height="650" rx="12" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="770" y="56" width="300" height="22" rx="4" fill="#ea580c"/>
  <text x="780" y="72" class="tag">辅助 LangChain 调用（Loop 外部，运行前/运行中）</text>
  <rect x="780" y="92" width="280" height="76" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
  <text x="920" y="112" text-anchor="middle" class="node-label">ChatPlanner</text>
  <text x="790" y="130" class="code-label">classifyRequiredCapabilities()</text>
  <text x="790" y="146" class="sub-label">ChatPromptTemplate → .pipe(llm).invoke()</text>
  <text x="790" y="160" class="sub-label">→ 判断是否需要 memory/currentNote/webSearch</text>
  <rect x="780" y="182" width="280" height="76" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
  <text x="920" y="202" text-anchor="middle" class="node-label">MemorySearchTool</text>
  <text x="790" y="220" class="code-label">rewriteQueryIfNeeded()</text>
  <text x="790" y="236" class="sub-label">ChatPromptTemplate → .pipe(llm).invoke()</text>
  <text x="790" y="252" class="sub-label">→ 从自然语言提取 FTS 关键词</text>
  <rect x="780" y="272" width="280" height="76" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
  <text x="920" y="292" text-anchor="middle" class="node-label">MemorySearchTool</text>
  <text x="790" y="310" class="code-label">rerankCandidates()</text>
  <text x="790" y="326" class="sub-label">ChatPromptTemplate → .pipe(llm).invoke()</text>
  <text x="790" y="342" class="sub-label">→ 用 LLM 过滤不相关的搜索结果</text>
  <rect x="780" y="362" width="280" height="76" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
  <text x="920" y="382" text-anchor="middle" class="node-label">VSS.searchHybrid()</text>
  <text x="790" y="400" class="code-label">OpenAIEmbeddings.embedQuery()</text>
  <text x="790" y="416" class="sub-label">→ 生成查询向量用于相似度搜索</text>
  <text x="790" y="432" class="sub-label">→ 与 FTS 结果做 RRF 融合</text>
  <rect x="780" y="460" width="280" height="116" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="920" y="480" text-anchor="middle" class="node-label" fill="#92400e">一次聊天的完整调用顺序</text>
  <text x="790" y="500" class="code-label" fill="#92400e">1. classifyRequired.. (运行前)</text>
  <text x="790" y="516" class="code-label" fill="#92400e">2. rewriteQuery (search_memory 工具内)</text>
  <text x="790" y="532" class="code-label" fill="#92400e">3. embedQuery   (search_memory 工具内)</text>
  <text x="790" y="548" class="code-label" fill="#92400e">4. rerank       (search_memory 工具内)</text>
  <text x="790" y="564" class="code-label" fill="#92400e">5. chat completion (每个 turn)</text>
  <rect x="780" y="590" width="280" height="96" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="920" y="612" text-anchor="middle" class="node-label" fill="#1e40af">关键结论</text>
  <text x="790" y="632" class="sub-label" fill="#1e40af">LangChain 被 Runtime 层封装</text>
  <text x="790" y="648" class="sub-label" fill="#1e40af">Loop 层完全解耦，不受 LangChain 影响</text>
  <text x="790" y="664" class="sub-label" fill="#1e40af">如需替换 LangChain，只改 Runtime 层</text>
  <text x="790" y="680" class="sub-label" fill="#1e40af">和辅助工具，Loop 层零改动</text>
  <!-- Legend -->
  <rect x="30" y="720" width="700" height="140" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="50" y="745" class="layer-label">图例</text>
  <rect x="50" y="755" width="16" height="16" rx="3" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="74" y="768" class="legend-text">层1: 纯编排（无 LangChain 依赖）</text>
  <rect x="50" y="778" width="16" height="16" rx="3" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="74" y="791" class="legend-text">层2: 集成层（LangChain 在此封装和适配）</text>
  <rect x="50" y="801" width="16" height="16" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="74" y="814" class="legend-text">层3: LangChain 模型包装器 + AI Provider</text>
  <rect x="50" y="824" width="16" height="16" rx="3" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="74" y="837" class="legend-text">辅助调用（不在 Loop 内部，但也用 LangChain）</text>
  <line x1="400" y1="763" x2="430" y2="763" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="438" y="768" class="legend-text">接口依赖</text>
  <line x1="400" y1="786" x2="430" y2="786" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>
  <text x="438" y="791" class="legend-text">接口实现</text>
  <line x1="400" y1="809" x2="430" y2="809" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="438" y="814" class="legend-text">模型创建调用</text>
  <line x1="400" y1="832" x2="430" y2="832" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="438" y="837" class="legend-text">内部调用/HTTP</text>
  <rect x="560" y="755" width="100" height="18" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="668" y="768" class="legend-text">接口定义（虚线边框）</text>
  <rect x="560" y="780" width="100" height="18" rx="4" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <text x="668" y="793" class="legend-text">LangChain 封装组件</text>
</svg>