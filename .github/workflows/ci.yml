name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check third-party notices
        run: npm run check:third-party-notices
      - name: Check documentation workflow
        env:
          DOCS_CHECK_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: npm run docs:check
      - name: Test
        run: npm test -- --runInBand --coverage
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Audit bundle
        run: npm run audit:bundle
