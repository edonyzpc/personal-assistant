name: Build obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check third-party notices
        run: npm run check:third-party-notices
      - name: Test
        run: npm test -- --runInBand --coverage
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build --if-present
      - name: Audit bundle
        run: npm run audit:bundle
      - name: Stage release assets
        run: |
          mkdir -p release-assets
          cp dist/main.js release-assets/main.js
          cp dist/manifest.json release-assets/manifest.json
          cp dist/styles.css release-assets/styles.css
          cp LICENSE release-assets/LICENSE
          cp NOTICE release-assets/NOTICE
          cp THIRD_PARTY_NOTICES.md release-assets/THIRD_PARTY_NOTICES.md
      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: |
            release-assets/main.js
            release-assets/manifest.json
            release-assets/styles.css
            release-assets/LICENSE
            release-assets/NOTICE
            release-assets/THIRD_PARTY_NOTICES.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_flags=()
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            release_flags+=(--prerelease)
          fi

          gh release create "${GITHUB_REF_NAME}" \
            "${release_flags[@]}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-from-tag \
            --verify-tag \
            ./release-assets/main.js \
            ./release-assets/manifest.json \
            ./release-assets/styles.css \
            ./release-assets/LICENSE \
            ./release-assets/NOTICE \
            ./release-assets/THIRD_PARTY_NOTICES.md
