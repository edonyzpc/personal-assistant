name: Build obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm test -- --runInBand
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build --if-present
      - name: Audit bundle
        run: npm run audit:bundle
      - name: Stage release assets
        run: |
          mkdir -p release-assets
          cp dist/main.js release-assets/main.js
          cp dist/manifest.json release-assets/manifest.json
          cp dist/styles.css release-assets/styles.css
      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: |
            release-assets/main.js
            release-assets/manifest.json
            release-assets/styles.css
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-from-tag \
            --verify-tag \
            ./release-assets/main.js \
            ./release-assets/manifest.json \
            ./release-assets/styles.css
